<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บ้านกฤติญา - ห้องพัก</title>

    <!-- font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * {
            font-family: 'Prompt', sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-50">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex justify-between items-center h-16">

            <a href="index.html">
                <span class="text-xl font-semibold text-gray-900">
                    บ้านกฤติญา
                </span>
            </a>

            <!-- desktop menu -->
            <nav class="hidden md:flex items-center gap-6">

                <a href="index.html" style="color:#2E7D32">
                    หน้าแรก
                </a>

                <a href="room.html" style="color:#2E7D32">
                    ห้องพัก
                </a>

                <a href="auth.html"
                   class="bg-green-700 text-white px-4 py-2 rounded-lg hover:bg-green-800">
                    เข้าสู่ระบบ
                </a>

            </nav>

            <!-- mobile button -->
            <button id="menuBtn" class="md:hidden text-2xl">
                ☰
            </button>

        </div>

        <!-- mobile menu -->
        <nav id="mobileMenu" class="hidden py-4 border-t">

            <div class="flex flex-col gap-4">

                <a href="index.html">หน้าแรก</a>

                <a href="room.html">ห้องพัก</a>

                <a href="auth.html"
                   class="bg-green-700 text-white px-4 py-2 rounded-lg text-center">
                    เข้าสู่ระบบ
                </a>

            </div>

        </nav>

    </div>

</header>


<!-- MAIN -->
<main class="bg-gray-50">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

    <!-- title -->
    <div class="mb-8">

        <h1 class="text-3xl font-bold mb-2">
            ห้องพักทั้งหมด
        </h1>

        <p class="text-gray-600">
            ค้นหาห้องพักที่เหมาะสำหรับคุณ
        </p>

    </div>


    <!-- filter -->
    <div class="bg-white rounded-xl p-6 shadow-sm border mb-8">

        <label class="flex items-center gap-3">

            <input type="checkbox"
                   id="available-only"
                   class="w-5 h-5">

            แสดงเฉพาะห้องว่าง

        </label>

    </div>


    <!-- loading -->
    <div id="loadingState"
         class="hidden text-center py-10 text-gray-600">

        กำลังโหลดข้อมูลห้อง...

    </div>


    <!-- ROOMS FROM DATABASE -->
    <div id="roomGrid"
         class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-6">

        <!-- javascript จะใส่ข้อมูลตรงนี้ -->

    </div>


</div>

</main>


<!-- FOOTER -->
<footer class="bg-green-700 text-white py-8 mt-16">

    <div class="text-center">

        © 2026 บ้านกฤติญา  
        <br>
        ติดต่อ: 062-108-8868

    </div>

</footer>


<!-- SCRIPT -->
<script src="js/room.js"></script>


</body>
</html>
